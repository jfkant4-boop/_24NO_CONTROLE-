<script>
        // ============================================================
        // 🛡️ TRAVA DE SEGURANÇA - SISTEMAS TOTAL
        // ============================================================
        const VALIDADE = "2026-05-30"; // <--- DATA QUE O SISTEMA PARA DE FUNCIONAR
        const MEU_ZAP = "5563999973657"; // <--- SEU WHATSAPP (APENAS NÚMEROS)

        function validarAcessoGeral() {
            const hoje = new Date();
            const dataVencimento = new Date(VALIDADE + "T23:59:59");
            
            if (hoje > dataVencimento) {
                document.body.innerHTML = `
                    <div style="height:100vh; background:#050505; color:white; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; font-family: 'Inter', sans-serif;">
                        <div style="font-size: 100px; margin-bottom: 20px;">🚫</div>
                        <h2 style="color:#FF3B30; font-weight:900; font-size: 2rem; margin-bottom: 10px;">ACESSO SUSPENSO</h2>
                        <p style="color:#8D8D99; max-width: 400px; line-height: 1.6; margin-bottom: 30px;">
                            A licença deste sistema expirou em <b>${VALIDADE.split('-').reverse().join('/')}</b>.<br>
                            Entre em contato com o administrador para renovar seu acesso.
                        </p>
                        <a href="https://wa.me/${MEU_ZAP}?text=Olá, meu sistema bloqueou. Gostaria de renovar o acesso." 
                           style="background:#04D361; color:#000; padding:18px 35px; border-radius:12px; text-decoration:none; font-weight:bold; font-size: 1.1rem; transition: 0.3s; box-shadow: 0 10px 20px rgba(4, 211, 97, 0.2);">
                           PAGAR MENSALIDADE
                        </a>
                    </div>`;
                return false;
            }
            return true;
        }

        // Executa a trava antes de qualquer outra coisa
        if (!validarAcessoGeral()) {
            throw new Error("Sistema suspenso por falta de pagamento.");
        }

        // --- RESTANTE DO SEU CÓDIGO (ESTADO DA APLICAÇÃO) ---
        let db = JSON.parse(localStorage.getItem('sistema_master_db')) || { 
            password: '4455', pin: '1212', caixa: 10000, lucro: 0, 
            clients: [], loans: []
        };

        const saveDb = () => localStorage.setItem('sistema_master_db', JSON.stringify(db));
        const fmtM = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);
        const fmtD = (iso) => { const [y,m,d] = iso.split('T')[0].split('-'); return `${d}/${m}/${y}`; };

        const showToast = (msg, isError = false) => {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div'); t.className = 'toast'; t.style.borderLeftColor = isError ? 'var(--danger)' : 'var(--brand)';
            t.innerHTML = `<i class="ph-fill ${isError ? 'ph-warning-circle' : 'ph-check-circle'}" style="color: ${isError ? 'var(--danger)' : 'var(--brand)'}; font-size: 1.2rem;"></i> ${msg}`;
            container.appendChild(t); setTimeout(() => t.remove(), 3000);
        };

        // --- LOGIN E SEGURANÇA ---
        window.onload = () => { 
            // Garante que se estiver bloqueado, nem a tela de login aparece
            if(validarAcessoGeral()) {
                document.getElementById('login-screen').style.display = 'flex'; 
            }
        };

        let typed = '';
        function typePass(n) {
            if(typed.length < 4) { typed += n; document.querySelectorAll('.dot').forEach((d, i) => i < typed.length ? d.classList.add('filled') : d.classList.remove('filled')); }
            if(typed.length === 4) setTimeout(() => { 
                if(typed === db.password) { 
                    document.getElementById('login-screen').style.display = 'none'; 
                    document.getElementById('app').style.display = window.innerWidth >= 768 ? 'flex' : 'block'; 
                    initApp(); 
                } else { typed=''; document.querySelectorAll('.dot').forEach(d=>d.classList.remove('filled')); showToast('Senha Incorreta', true); } 
            }, 200);
        }
        function clearPass() { typed=''; document.querySelectorAll('.dot').forEach(d=>d.classList.remove('filled')); }
        function lockApp() { document.getElementById('app').style.display = 'none'; document.getElementById('login-screen').style.display = 'flex'; clearPass(); }

        window.addEventListener('resize', () => { if(document.getElementById('app').style.display !== 'none') document.getElementById('app').style.display = window.innerWidth >= 768 ? 'flex' : 'block'; });

        // --- INICIALIZAÇÃO ---
        function initApp() {
            document.getElementById('date-display').innerText = new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long', year:'numeric' });
            updateDashboard(); renderClients(); populateClientSelect(); renderPortfolio();
        }

        function switchTab(tabId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById(`view-${tabId}`).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.querySelectorAll(`.nav-item[data-target="${tabId}"]`).forEach(n => n.classList.add('active'));
        }
        
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        // --- DASHBOARD (E EDIÇÃO DE CAIXA) ---
        function updateDashboard() {
            let rua = 0; let rendimentoDiario = 0;
            db.loans.forEach(l => {
                if(l.saldoDevedor > 0) {
                    rua += l.saldoDevedor;
                    rendimentoDiario += l.saldoDevedor * (l.taxaMensal / 30);
                }
            });

            document.getElementById('ind-caixa').innerText = fmtM(db.caixa);
            document.getElementById('ind-rua').innerText = fmtM(rua);
            document.getElementById('ind-total').innerText = fmtM(db.caixa + rua);
            document.getElementById('ind-lucro').innerText = fmtM(db.lucro);
            document.getElementById('ind-rendimento-dia').innerText = fmtM(rendimentoDiario);
        }

        function abrirModalEditarCaixa() {
            document.getElementById('edit-caixa-val').value = db.caixa.toFixed(2);
            openModal('modal-editar-caixa');
        }

        function salvarEdicaoCaixa() {
            const novoValor = parseFloat(document.getElementById('edit-caixa-val').value);
            if (isNaN(novoValor) || novoValor < 0) return showToast('Insira um valor válido', true);
            db.caixa = novoValor;
            saveDb(); updateDashboard(); closeModal('modal-editar-caixa'); showToast('Saldo atualizado com sucesso!');
        }

        // --- CLIENTES ---
        function salvarCliente() {
            const nome = document.getElementById('cli-nome').value;
            if(!nome) return showToast('Nome obrigatório', true);
            db.clients.push({ id: Date.now(), nome, tel: document.getElementById('cli-tel').value });
            saveDb(); closeModal('modal-cliente'); renderClients(); populateClientSelect(); showToast('Cliente Cadastrado!');
            document.getElementById('cli-nome').value = ''; document.getElementById('cli-tel').value = '';
        }
        function renderClients() {
            document.getElementById('list-clientes').innerHTML = db.clients.map(c => `
                <div class="card-list"><div><strong style="color:white; display:block;">${c.nome}</strong><span style="font-size:0.8rem; color:var(--text-muted);">${c.tel || 'Sem telefone'}</span></div></div>
            `).join('') || '<p style="text-align:center; color:var(--text-muted); font-size:0.9rem; padding: 20px;">Nenhum cliente cadastrado.</p>';
        }
        function populateClientSelect() { document.getElementById('sim-cliente').innerHTML = db.clients.map(c => `<option value="${c.id}">${c.nome}</option>`).join(''); }

        // --- EMPRÉSTIMO ---
        function aprovarEmprestimo() {
            const cliId = document.getElementById('sim-cliente').value;
            const valor = parseFloat(document.getElementById('sim-valor').value);
            const taxa = parseFloat(document.getElementById('sim-taxa').value) / 100;
            
            if(!cliId || !valor || !taxa) return showToast('Preencha todos os campos', true);
            if(valor > db.caixa) return showToast('Saldo em Caixa Insuficiente', true);

            db.caixa -= valor; 
            db.loans.push({ id: Date.now(), cliId: parseInt(cliId), valorOrig: valor, saldoDevedor: valor, taxaMensal: taxa, dataUltimoCalculo: new Date().toISOString().split('T')[0], history: [] });

            saveDb(); document.getElementById('sim-valor').value = ''; showToast('Contrato Liberado com Sucesso!');
            updateDashboard(); renderPortfolio(); switchTab('portfolio');
        }

        // --- CARTEIRA (GIRO DIÁRIO) ---
        function renderPortfolio() {
            const list = db.loans.filter(l => l.saldoDevedor > 0).map(l => {
                const cli = db.clients.find(c => c.id === l.cliId);
                const { days, interest } = calcJuros(l);
                return `
                <div class="card-list" style="cursor:pointer; border-left: 4px solid var(--info);" onclick="abrirMotorAmortizacao(${l.id})">
                    <div style="flex:1;">
                        <p style="color:white; font-weight:600; font-size:1.1rem; margin-bottom:2px;">${cli.nome}</p>
                        <p style="font-size:0.75rem; color:var(--text-muted);">Saldo: ${fmtM(l.saldoDevedor)} • Último Giro: ${fmtD(l.dataUltimoCalculo)}</p>
                    </div>
                    <div style="text-align:right;">
                        <p style="font-size:0.7rem; color:var(--warning);">+ ${days} dias (${fmtM(interest)})</p>
                        <i class="ph-bold ph-caret-right" style="color:var(--text-muted); font-size:1.2rem; margin-top:5px; display:inline-block;"></i>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('list-carteira').innerHTML = list || '<p style="text-align:center; color:var(--text-muted); font-size:0.9rem; padding: 20px;">Nenhum contrato ativo.</p>';
        }

        function calcJuros(loan) {
            const dataBase = new Date(loan.dataUltimoCalculo + 'T00:00:00');
            let diasCorridos = Math.floor((new Date() - dataBase) / 86400000);
            if (diasCorridos < 0) diasCorridos = 0; 
            const taxaDia = loan.taxaMensal / 30;
            return { days: diasCorridos, interest: Math.round((loan.saldoDevedor * taxaDia * diasCorridos) * 100)/100 }; 
        }

        let currentLoanProcess = null;

        function abrirMotorAmortizacao(id) {
            const loan = db.loans.find(l => l.id === id);
            const cli = db.clients.find(c => c.id === loan.cliId);
            const calc = calcJuros(loan);

            currentLoanProcess = { loan, calc };

            document.getElementById('amo-cli-nome').innerText = cli.nome;
            document.getElementById('amo-saldo-principal').innerText = fmtM(loan.saldoDevedor);
            document.getElementById('amo-dias-corridos').innerText = `${calc.days} dias`;
            document.getElementById('amo-juro-acumulado').innerText = fmtM(calc.interest);
            document.getElementById('amo-divida-total').innerText = fmtM(loan.saldoDevedor + calc.interest);
            
            document.getElementById('amo-valor-pago').value = '';
            document.getElementById('amo-simulacao').style.display = 'none';

            openModal('modal-amortizacao');
        }

        function calcularSimulacaoAmortizacao() {
            const valorPago = parseFloat(document.getElementById('amo-valor-pago').value) || 0;
            if(valorPago <= 0) { document.getElementById('amo-simulacao').style.display = 'none'; return; }

            const { interest } = currentLoanProcess.calc;
            const saldoAtual = currentLoanProcess.loan.saldoDevedor;

            let abateJuro = valorPago >= interest ? interest : valorPago;
            let abateRaiz = valorPago >= interest ? (valorPago - interest) : 0;

            let novoSaldo = saldoAtual - abateRaiz;
            if (novoSaldo < 0) novoSaldo = 0;

            document.getElementById('sim-juro').innerText = fmtM(abateJuro);
            document.getElementById('sim-raiz').innerText = fmtM(abateRaiz);
            document.getElementById('sim-novo-saldo').innerText = fmtM(novoSaldo);
            document.getElementById('amo-simulacao').style.display = 'block';
        }

        function confirmarPagamento() {
            const valorPago = parseFloat(document.getElementById('amo-valor-pago').value) || 0;
            if(valorPago <= 0) return showToast('Digite o valor pago', true);

            const loan = currentLoanProcess.loan;
            const { interest } = currentLoanProcess.calc;

            let abateJuro = valorPago >= interest ? interest : valorPago;
            let abateRaiz = valorPago >= interest ? (valorPago - interest) : 0;

            if(abateRaiz > loan.saldoDevedor) abateRaiz = loan.saldoDevedor;

            const valorRealPago = abateJuro + abateRaiz; 

            db.caixa += valorRealPago; 
            db.lucro += abateJuro; 
            loan.saldoDevedor -= abateRaiz;
            loan.dataUltimoCalculo = new Date().toISOString().split('T')[0];

            loan.history.push({ id: Date.now(), data: new Date().toISOString().split('T')[0], valorPago: valorRealPago, juroPago: abateJuro, raizPaga: abateRaiz });

            saveDb(); closeModal('modal-amortizacao'); showToast('Giro Processado com Sucesso!');
            updateDashboard(); renderPortfolio();
        }

        function gerarPDFContrato() {
            if(!currentLoanProcess) return;
            const loan = currentLoanProcess.loan;
            const cli = db.clients.find(c => c.id === loan.cliId);

            document.getElementById('pdf-nome').innerText = cli.nome;
            document.getElementById('pdf-data-hoje').innerText = new Date().toLocaleDateString('pt-BR');
            document.getElementById('pdf-data-inicio').innerText = fmtD(loan.history.length > 0 ? loan.history[0].data : loan.dataUltimoCalculo);
            document.getElementById('pdf-valor-orig').innerText = fmtM(loan.valorOrig);
            document.getElementById('pdf-taxa').innerText = `${loan.taxaMensal * 100}% a.m`;
            document.getElementById('pdf-saldo').innerText = fmtM(loan.saldoDevedor);

            const histHtml = loan.history.map(h => `
                <tr style="border-bottom: 1px solid #ddd;">
                    <td style="padding: 8px;">${fmtD(h.data)}</td>
                    <td style="padding: 8px; color: green; font-weight: bold;">${fmtM(h.valorPago)}</td>
                    <td style="padding: 8px;">${fmtM(h.juroPago)}</td>
                    <td style="padding: 8px;">${fmtM(h.raizPaga)}</td>
                </tr>`).join('');
            
            document.getElementById('pdf-historico').innerHTML = histHtml || '<tr><td colspan="4" style="text-align:center; padding: 10px;">Nenhum pagamento registrado ainda.</td></tr>';

            const element = document.getElementById('pdf-template');
            element.style.display = 'block'; 
            
            const opt = { margin: 10, filename: `Extrato_${cli.nome.replace(' ','_')}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
            
            html2pdf().set(opt).from(element).save().then(() => { element.style.display = 'none'; showToast('PDF Gerado e Baixado!'); });
        }

        function salvarSenha() {
            if(document.getElementById('conf-pin').value !== db.pin) return showToast('PIN Autorização Incorreto', true);
            const n = document.getElementById('conf-senha').value;
            if(n.length !== 4) return showToast('Senha deve ter 4 digitos', true);
            db.password = n; saveDb(); showToast('Senha de acesso atualizada!'); closeModal('modal-seguranca');
        }

        function zerarSistema() {
            if(prompt('ATENÇÃO: Digite 1212 para excluir todos os dados do sistema:') === '1212') {
                localStorage.removeItem('sistema_master_db'); location.reload();
            }
        }

        function exportExcel() {
            let csv = "\uFEFFData,Cliente,Valor Pago (R$),Juros (Lucro),Principal Abatido\n";
            db.loans.forEach(l => {
                const c = db.clients.find(cli => cli.id === l.cliId);
                l.history.forEach(h => { csv += `${h.data},${c.nome},${h.valorPago},${h.juroPago},${h.raizPaga}\n`; });
            });
            const link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
            link.download = `Base_de_Dados_${new Date().getTime()}.csv`; link.click(); showToast('Excel baixado com sucesso!');
        }
    </script>
</body>
</html>
